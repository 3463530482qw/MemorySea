[icon]
icon = image/icon/icon.png

[windowcreate]
name = MemorySea_SexualIntercourse     ;记忆之海“性与爱”
w = 0
h = 0
fullscreen = false           ; 窗口处于全屏模式
opengl = false               ; 窗口可用于 OpenGL 上下文
occluded = false             ; 窗口被遮挡
hidden = false               ; 窗口隐藏，不在桌面映射且不显示在任务栏
borderless = false           ; 无边框窗口（无窗口装饰）
resizable = true             ; 窗口可调整大小
minimized = false            ; 窗口已最小化
maximized = false            ; 窗口已最大化
mouse_grabbed = false        ; 窗口捕获（抓取）了鼠标输入
input_focus = false          ; 窗口拥有输入焦点
mouse_focus = false          ; 窗口拥有鼠标焦点
external = false             ; 窗口并非由 SDL 创建（外部窗口）
modal = false                ; 窗口为模态窗口
high_pixel_density = false   ; 窗口尽可能使用高像素密度后端缓冲区
mouse_capture = false        ; 窗口捕获了鼠标（与mouse_grabbed无关）
mouse_relative_mode = false  ; 窗口启用了鼠标相对模式
always_on_top = false        ; 窗口始终置于最顶层
utility = false              ; 窗口作为实用工具窗口，不显示在任务栏和窗口列表中
tooltip = false              ; 窗口作为工具提示，不获取鼠标/键盘焦点，需要父窗口
popup_menu = false           ; 窗口作为弹出菜单，需要父窗口
keyboard_grabbed = false     ; 窗口捕获（抓取）了键盘输入
fill_document = false        ; 窗口处于填充文档模式（仅限Emscripten）
vulkan = true                ; 窗口可用于 Vulkan 渲染表面
metal = false                ; 窗口可用于 Metal 渲染视图
transparent = false          ; 窗口带有透明缓冲区
not_focusable = false        ; 窗口不应获取焦点